<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Analysis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            max-width: 420px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #8b949e;
            margin-bottom: 2rem;
        }
        form {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #30363d;
            border-radius: 6px;
            background: #161b22;
            color: #e6edf3;
            font-size: 1rem;
        }
        input[type="text"]::placeholder { color: #6e7681; }
        input[type="text"]:focus {
            outline: none;
            border-color: #58a6ff;
        }
        button {
            padding: 0.75rem 1.25rem;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
        }
        button:hover { background: #2ea043; }
        .hint { font-size: 0.8rem; color: #6e7681; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stock Market Analysis</h1>
        <form method="post" action="/">
            {% csrf_token %}
            <input type="text" name="symbol" placeholder="Enter symbol (e.g. AAPL)" required autofocus>
            <button type="submit">Analyze</button>
        </form>
        <p class="hint">Search by ticker: AAPL, MSFT, GOOGL, TSLA...</p>
    </div>
</body>
</html>
